name: 自動更新大樂透開獎資料

on:
  schedule:
    # 每週二 22:00 台灣時間（UTC+8 → UTC 14:00）
    - cron: '0 14 * * 2'
    # 每週五 22:00 台灣時間
    - cron: '0 14 * * 5'
  # 允許手動觸發
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lotto-data:
    runs-on: ubuntu-latest

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝相依套件
        run: pip install -r requirements.txt

      - name: 執行爬蟲更新資料
        run: python src/scraper.py

      - name: 提交更新後的 CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/lotto_history.csv
          # 若無變動則跳過 commit
          git diff --cached --quiet || git commit -m "chore: 自動更新大樂透歷史資料 $(date +'%Y-%m-%d')"

      - name: 推送至遠端
        run: git push
