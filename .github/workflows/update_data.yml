name: 自動更新大樂透開獎資料

on:
  schedule:
    # 每週二 22:00 台灣時間（UTC+8 → UTC 14:00）
    - cron: '0 14 * * 2'
    # 每週五 22:00 台灣時間
    - cron: '0 14 * * 5'
  # 允許手動觸發（可選填補抓月數）
  workflow_dispatch:
    inputs:
      backfill:
        description: '補抓歷史月數（0=只做增量更新，36=三年）'
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  update-lotto-data:
    runs-on: ubuntu-latest

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝相依套件
        run: pip install -r requirements.txt

      - name: 執行爬蟲（增量更新 or 補抓歷史）
        run: |
          MONTHS="${{ github.event.inputs.backfill || '0' }}"
          if [ "$MONTHS" -gt "0" ]; then
            echo "補抓過去 $MONTHS 個月歷史資料..."
            python src/scraper.py --backfill "$MONTHS"
          else
            echo "執行增量更新..."
            python src/scraper.py
          fi

      - name: 提交更新後的 CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/lotto_history.csv
          git diff --cached --quiet || git commit -m "chore: 自動更新大樂透歷史資料 $(date +'%Y-%m-%d')"

      - name: 推送至遠端
        run: git push
